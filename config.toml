[lm_studio]
base_url = "http://192.168.50.91:1234/v1"
model = "google/gemma-4-26b-a4b"
timeout = 300
max_retries = 3

[whisper]
model_size = "large-v3" # tiny | base | small | medium | large-v3
device = "cuda"         # cpu | cuda
compute_type = "float16" # int8 | float16 | float32
download_root = "./models/faster-whisper"

# no_speech_threshold — probability (0.0–1.0) that a segment is silence.
#   Whisper skips any segment whose silence score is ABOVE this number.
#   0.6 (default) = only keep segments that are clearly speech.
#   Lower → more greedy: 0.3 keeps segments even if Whisper is unsure whether
#   they contain speech. Useful when quiet or accented speech gets dropped.
no_speech_threshold = 0.45

# log_prob_threshold — average log-probability (negative number) of the
#   recognised tokens in a segment. More negative = less confident.
#   Whisper discards segments whose score is BELOW this number.
#   -1.0 (default) = discard very uncertain segments.
#   Lower → more greedy: -2.0 keeps low-confidence segments instead of
#   dropping them. Useful when Whisper silently skips mumbled speech.
log_prob_threshold = -1.0

# beam_size — number of hypotheses Whisper keeps at each decoding step.
#   Higher = more accurate but slower. 5 is the default.
beam_size = 5

# condition_on_previous_text — feed each 30s window's output as context for
#   the next window. true = better continuity between sentences.
#   If transcription stops early (last N minutes missing), set this to false —
#   a hallucination loop in one window can make Whisper think it's done.
condition_on_previous_text = true

# fast_model_size — model used when --fast-mode flag is passed.
#   Approx 4× faster than large-v3 with minimal quality loss for most content.
fast_model_size = "Systran/faster-whisper-large-v3-turbo"

[minio]
endpoint = "localhost:9000"
secure = false
input_bucket = "video-input"
output_bucket = "video-output"

[pipeline]
chunk_duration = 300    # seconds per audio chunk
chunk_overlap = 5       # overlap between chunks in seconds
temp_dir = "./tmp/video-caption"
